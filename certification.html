    border-radius: 8px;

    color: var(--muted);
    font-size: 13px;
    transition: transform 0.25s;
    min-width: 16px;
    text-align: center;
    padding-top: 3px;

  .qa-item.open .chevron { transform: rotate(180deg); }

  .a-body {
    display: none;
    padding: 0 18px 18px 60px;
    background: var(--answer-bg);
    border-top: 1px solid var(--border);
  }

  .qa-item.open .a-body { display: block; }

  .a-body p { color: #b0b8cc; font-size: 14px; margin-top: 14px; }

  .a-body ul, .a-body ol {
    color: #b0b8cc;
    font-size: 14px;
    padding-left: 20px;
    margin-top: 10px;
  }

  .a-body li { margin-bottom: 6px; }

  .a-body code {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: #1a1e2a;
    border: 1px solid #2a2f3d;
    border-radius: 3px;
    padding: 1px 6px;
    color: #e2e6f0;
  }

  .a-body .highlight {
    background: rgba(61,220,132,0.07);
    border-left: 2px solid var(--accent-android);
    padding: 10px 14px;
    border-radius: 0 4px 4px 0;
    margin-top: 12px;
    font-size: 13px;

    background: rgba(199,168,255,0.07);
    border-left-color: var(--accent-apple);

    border-left-color: var(--accent-shared);
    color: #8aafc0;

  .no-results {

    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 60px 20px;

    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;

    margin: 0 auto 24px;

    font-size: 11px;

    border: 1px solid var(--border);

    color: var(--muted);

<script>
const QA = [
  // ─── SHARED / COMMON ───────────────────────────────────────────────
  {
    cat: "shared",
    tag: "Shared",
    q: "What is the difference between Android Auto, AAOS, and Apple CarPlay?",
    a: `<p><strong>Android Auto</strong> is a phone-projection protocol — it mirrors a compatible Android phone's UI on the car's head unit display via USB or Wi-Fi. The phone runs the app; the HU just renders it.</p>
    <p><strong>AAOS (Android Automotive OS)</strong> is a full-stack embedded OS that runs natively in the vehicle — no phone required. Apps are installed directly on the HU (e.g., Spotify, Google Maps built-in).</p>
    <p><strong>Apple CarPlay</strong> is Apple's equivalent of Android Auto — a projection solution that mirrors a paired iPhone on the HU via USB (wired) or Wi-Fi (wireless). It uses the iAP2 protocol over USB and Bluetooth for wireless initiation.</p>
    <div class="highlight">Key interview point: AAOS = embedded OS; Android Auto & CarPlay = projection protocols. Certification requirements differ significantly between the two paradigms.</div>`
  },
  {
    cat: "shared",
    tag: "Shared",
    q: "What is the MirrorLink standard and how does it compare to CarPlay/Android Auto?",
    a: `<p>MirrorLink is a CCC (Car Connectivity Consortium) standard for phone-to-car projection. Unlike CarPlay (Apple proprietary) and Android Auto (Google), MirrorLink was vendor-neutral and used RTP/RTSP for display mirroring over USB.</p>
    <p>MirrorLink has largely been deprecated in favor of CarPlay and Android Auto since OEMs moved toward those ecosystems. Key difference: MirrorLink projected the phone's screen as-is; CarPlay/AA render a purpose-built automotive UI.</p>`
  },
  {
    cat: "shared",
    tag: "Shared",
    q: "What is iAP2 and why is it critical for CarPlay certification?",
    a: `<p>iAP2 (iPod Accessory Protocol 2) is Apple's proprietary accessory communication protocol used over USB. It is the mandatory transport layer for wired CarPlay, handling authentication, session negotiation, and data exchange between the iPhone and the HU.</p>
    <ul>
      <li>CarPlay uses iAP2 + USB Audio Class 2.0 for audio routing</li>
      <li>MFi (Made for iPhone) certification is a prerequisite — the HU must carry Apple's authentication chip (coprocessor)</li>
      <li>iAP2 Bluetooth Transport is used for wireless CarPlay session handoff</li>
    </ul>
    <div class="highlight">Without an Apple-approved iAP2 auth coprocessor on the HU PCB, CarPlay simply will not connect — this is the first hardware gate in certification.</div>`
  },
  {
    cat: "shared",
    tag: "Shared",
    q: "Explain the concept of wired vs wireless projection in AA and CarPlay.",
    a: `<p><strong>Wired:</strong> Phone connects via USB cable. Session setup is fast and stable. Audio is routed via USB Audio Class 2.0 (CarPlay) or AOA 2.0 (Android Auto). No pairing overhead.</p>
    <p><strong>Wireless:</strong> Uses Bluetooth for initial session negotiation and Wi-Fi (typically Wi-Fi Direct / P2P on 5GHz band) for the actual data stream (video frames, audio, touch events). Requirements:</p>
    <ul>
      <li>CarPlay Wireless: BT 4.0+, Wi-Fi 802.11ac (5GHz), specific Wi-Fi Direct capabilities</li>
      <li>AA Wireless: AOAWi-Fi, Wi-Fi Direct or SoftAP mode</li>
    </ul>
    <div class="highlight">Test coverage must include: BT pairing stability, Wi-Fi handshake timing, reconnection on signal drop, simultaneous USB charging during wireless session.</div>`
  },
  {
    cat: "shared",
    tag: "Shared",
    q: "What testing tools do you use for CarPlay/Android Auto validation?",
    a: `<ul>
      <li><strong>ADB (Android Debug Bridge)</strong> — logcat, bugreport, app state inspection for AA/AAOS</li>
      <li><strong>iOS Instruments / Console.app</strong> — CarPlay session logs on iPhone side</li>
      <li><strong>Wireshark + USBPcap</strong> — iAP2 packet capture over USB</li>
      <li><strong>CANoe / CANalyzer</strong> — HU integration signals (reverse gear, vehicle speed, steering angle)</li>
      <li><strong>Apple's MFi Test Harness</strong> — For formal iAP2 compliance</li>
      <li><strong>Android Auto Desktop Head Unit (DHU)</strong> — Emulator for AA UI regression</li>
      <li><strong>Bluetooth Protocol Analyzer (Frontline / Ellisys)</strong> — for BT session traces</li>
    </ul>`
  },
  {
    cat: "shared",
    tag: "Shared",
    q: "What vehicle signals are mandatory inputs for both CarPlay and Android Auto?",
    a: `<p>Both protocols require the HU to provide certain vehicle context signals to the connected phone/OS:</p>
    <ul>
      <li><strong>Reverse Gear Signal</strong> — switches map/navigation to rear camera view</li>
      <li><strong>Night Mode Signal</strong> — triggers dark UI theme on the phone's projected display</li>
      <li><strong>Drive Mode / Road Type</strong> (optional but recommended)</li>
    </ul>
    <p>These are typically sourced from CAN bus and fed to the HU via middleware. Test cases must cover CAN signal injection and verify correct UI behavior on the phone side.</p>`
  },
  {
    cat: "shared",
    tag: "Shared",
    q: "How do you handle concurrent audio sources — e.g., CarPlay music + vehicle radio?",
    a: `<p>Audio management in infotainment involves an Audio Focus / Audio Policy framework:</p>
    <ul>
      <li>On AAOS: <code>AudioManager.requestAudioFocus()</code> with ducking/transient rules defined in OEM audio policy XML</li>
      <li>For CarPlay: the HU implements an Audio Session Manager that respects iAP2 audio stream priorities</li>
      <li>Common test cases: AM/FM interrupt during navigation guidance, phone call override of media, parking sensor beep ducking CarPlay audio</li>
    </ul>
    <div class="highlight">Always verify latency: navigation TTS prompt should duck media within 200–300 ms per OEM spec.</div>`
  },
  {
    cat: "shared",
    tag: "Shared",
    q: "What is the CCC (Car Connectivity Consortium) and what standards does it govern?",
    a: `<p>CCC is an industry alliance managing standards for phone-vehicle connectivity. Key standards:</p>
    <ul>
      <li><strong>MirrorLink</strong> — legacy projection standard (now mostly inactive)</li>
      <li><strong>Digital Key</strong> — NFC/UWB-based virtual car key standard (ISO 18013-5 aligned)</li>
      <li><strong>CCC-DS (Drive System)</strong> — specification for wireless digital key using UWB for precise ranging</li>
    </ul>
    <p>Apple and Google also participate in CCC; Digital Key 3.0 (UWB) is becoming common on premium vehicles and intersects with CarPlay/AAOS feature sets.</p>`
  },

  // ─── APPLE CARPLAY ─────────────────────────────────────────────────
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "Walk me through the Apple CarPlay wired connection setup sequence.",
    a: `<p>The connection sequence over USB:</p>
    <ol>
      <li>iPhone detects USB connection; HU USB host controller enumerates the device</li>
      <li>iAP2 Identification phase — iPhone queries HU for supported iAP2 features</li>
      <li>Authentication exchange using Apple auth coprocessor on HU</li>
      <li>iAP2 session opens; CarPlay capability declared via <code>SupportedExternalAccessoryProtocol</code></li>
      <li>USB Audio Class interface activated for audio routing</li>
      <li>CarPlay UI stream starts — H.264 video frames sent from iPhone to HU display</li>
      <li>Touch events (HID) sent from HU touchscreen back to iPhone</li>
    </ol>
    <div class="highlight">Connection time target is typically under 3 seconds from cable plug to UI appearing — test for regressions here, especially after HU software updates.</div>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "What are Apple's MFi certification requirements for a CarPlay head unit?",
    a: `<ul>
      <li>Integrate an Apple-approved <strong>authentication coprocessor</strong> (e.g., MFi Auth IC) on the HU PCB</li>
      <li>Implement <strong>iAP2</strong> protocol stack with all CarPlay-required feature bundles</li>
      <li>Pass Apple's <strong>MFi Compliance Test Harness (CTH)</strong> — automated iAP2 protocol conformance</li>
      <li>Submit HU hardware and firmware for Apple's <strong>MFi Program Review</strong></li>
      <li>Implement mandatory <strong>USB Audio Class 2.0</strong> support</li>
      <li>Display meets Apple's <strong>HMI guidelines</strong> (resolution, aspect ratio, touch response time &lt;50ms)</li>
      <li>Final <strong>Apple CarPlay entitlement</strong> granted per VIN/product line after successful audit</li>
    </ul>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "What is the Wireless CarPlay connection flow using Bluetooth?",
    a: `<p>Wireless CarPlay session initiation:</p>
    <ol>
      <li>iPhone previously paired with HU via BT (BT 4.0+ required)</li>
      <li>User enters vehicle; HU detects BT connection</li>
      <li>HU advertises CarPlay support over BT using Apple's proprietary service UUID</li>
      <li>iPhone sends CarPlay capability beacon over BT</li>
      <li>Wi-Fi Direct / P2P credentials exchanged over BT (out-of-band pairing)</li>
      <li>Wi-Fi Direct connection established on 5GHz (802.11ac); BT used as fallback signaling</li>
      <li>CarPlay session moves to Wi-Fi channel — same H.264/HID/audio as wired mode</li>
    </ol>
    <div class="highlight">Critical test: BT must be connected BEFORE Wi-Fi P2P. Test order-of-operations failures, especially on BT reconnect after engine restart.</div>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "What is the CarPlay display resolution specification and what happens if non-compliant?",
    a: `<p>Apple defines mandatory display tiers in the CarPlay Interface Guidelines:</p>
    <ul>
      <li><strong>Extra Wide (8.4"–10.25"+)</strong>: 1280×720 or 1920×720 aspect ratios</li>
      <li><strong>Standard (7"–8")</strong>: 800×480 minimum, 1024×600 common</li>
      <li>Pixel density must support 160+ PPI effective rendering</li>
    </ul>
    <p>Non-compliance during Apple's HMI review results in entitlement denial. OEMs must submit display specs pre-production for approval. Touch response time &lt;50ms and 60fps rendering are hard requirements.</p>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "What are the key CarPlay test scenarios for a certification test plan?",
    a: `<ul>
      <li>USB connect/disconnect cycle stability (50+ cycles)</li>
      <li>Wireless session setup time and reliability</li>
      <li>Audio handover: media → phone call → navigation TTS</li>
      <li>Reverse gear camera override behavior</li>
      <li>Night mode signal response (&lt;1s UI change)</li>
      <li>Screen orientation handling (landscape only)</li>
      <li>CarPlay UI crash recovery / reconnect</li>
      <li>Multiple iOS version compatibility (latest -2 versions min)</li>
      <li>iAP2 session stability during concurrent USB charging</li>
      <li>Siri voice activation from steering wheel buttons</li>
    </ul>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "How does CarPlay handle navigation handoff between Apple Maps and OEM navigation?",
    a: `<p>When CarPlay navigation is active, the HU receives navigation-state metadata from the iPhone (current maneuver, distance, street name) via the iAP2 <strong>NavigationAppSupportedCapabilities</strong> bundle. The OEM can optionally display this in the instrument cluster (IC) by consuming a dedicated CAN/MOST signal or via AUTOSAR COM.</p>
    <p>Handoff test cases:</p>
    <ul>
      <li>CarPlay navigation → OEM Nav: verify CarPlay nav gracefully clears from IC</li>
      <li>OEM Nav active → CarPlay connected: verify IC source arbitration</li>
      <li>Audio prompt conflict between both nav systems simultaneously</li>
    </ul>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "What is the role of the 'CarPlay entitlement' and how is it granted?",
    a: `<p>The CarPlay entitlement is a cryptographic permission Apple grants per product/model that allows the HU firmware to enable CarPlay functionality. Without it, even a fully iAP2-compliant HU will not activate CarPlay.</p>
    <p>Process: OEM submits hardware + firmware → Apple MFi team audits compliance → entitlement certificate issued → embedded in HU firmware. Entitlements are VIN-range or SKU-specific. This is why a software update that changes the entitlement scope requires re-submission.</p>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "What defects have you encountered in CarPlay certification and how did you debug them?",
    a: `<p>Common issues and debug approach:</p>
    <ul>
      <li><strong>iAP2 auth timeout</strong>: Captured USB traffic with Wireshark/USBPcap; found auth coprocessor I2C communication delay. Root cause: HU firmware I2C timeout set too low.</li>
      <li><strong>Audio dropout during calls</strong>: USB Audio Class interface reset mid-call. Reproduced with USB protocol analyzer; traced to USB hub power negotiation conflict.</li>
      <li><strong>Wireless session fails on engine restart</strong>: BT reconnect completing before Wi-Fi P2P credentials exchange timed out. Fixed by adding retry logic in HU BT manager.</li>
      <li><strong>Touch latency &gt;100ms</strong>: HU display driver was batching HID reports at 30Hz. Required driver change to 60Hz polling for Apple compliance.</li>
    </ul>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "Explain USB Audio Class and its role in CarPlay.",
    a: `<p>USB Audio Class (UAC) 2.0 is the standard protocol that allows a USB-connected device to act as an audio source/sink without custom drivers. In CarPlay:</p>
    <ul>
      <li>The iPhone presents itself as a UAC 2.0 device</li>
      <li>Audio from CarPlay apps (music, navigation TTS, calls) is routed as digital audio over USB to the HU's audio DSP</li>
      <li>Microphone audio from the HU's mic is sent back to the iPhone via the same USB UAC interface</li>
      <li>This eliminates Bluetooth A2DP for audio (lower latency, higher quality)</li>
    </ul>
    <div class="highlight">Test case: verify HU supports UAC 2.0 and not just UAC 1.0 — Apple mandates 2.0 for CarPlay.</div>`
  },

  // ─── ANDROID AUTO / AAOS ──────────────────────────────────────────
  {
    cat: "android",
    tag: "Android Auto",
    q: "What is the Android Open Automotive Alliance (OAA) and what does it require?",
    a: `<p>The Open Automotive Alliance is Google's industry consortium for AAOS adoption. OEMs joining OAA agree to:</p>
    <ul>
      <li>Implement AAOS per AOSP guidelines and Google's CDD (Compatibility Definition Document)</li>
      <li>Pass GMS (Google Mobile Services) automotive licensing requirements if shipping with Google apps</li>
      <li>Comply with Google's Android Automotive Compatibility Test Suite (CTS)</li>
      <li>Meet HMI safety guidelines (distraction guidelines per NHTSA/JAMA)</li>
    </ul>`
  },
  {
    cat: "android",
    tag: "Android Auto",
    q: "Explain the AOA (Android Open Accessory) protocol used in Android Auto.",
    a: `<p>AOA (Android Open Accessory) 2.0 is the protocol that allows a USB host (the HU) to communicate with an Android phone in accessory mode.</p>
    <ul>
      <li><strong>AOA 1.0</strong>: basic accessory communication</li>
      <li><strong>AOA 2.0</strong>: adds USB HID (for controls) and USB Audio support — required for Android Auto</li>
    </ul>
    <p>In the AA wired flow: phone switches to accessory mode, HU sends AOA identification strings, phone launches Android Auto app, session starts over AOA 2.0 transport. AOA 2.0 audio allows HU to present as audio source without phone-side drivers.</p>`
  },
  {
    cat: "android",
    tag: "Android Auto",
    q: "What is AAOS CTS and VTS, and how do they differ?",
    a: `<p><strong>CTS (Compatibility Test Suite)</strong>: Tests Android API compatibility — ensures apps written for Android Automotive will behave correctly on the HU. Covers API availability, behavior correctness, permission model, and UI standards.</p>
    <p><strong>VTS (Vendor Test Suite)</strong>: Tests the HAL (Hardware Abstraction Layer) implementations — verifies that the vendor's hardware drivers (audio HAL, vehicle HAL / VHAL, camera HAL) conform to AOSP interface definitions.</p>
    <div class="highlight">CTS = framework layer; VTS = HAL layer. Both must pass for GMS certification. VTS failures often indicate VHAL misimplementation — a common issue in new platform bring-up.</div>`
  },
  {
    cat: "android",
    tag: "Android Auto",

      <li><strong>Objective measurements</strong>: THD+N (Total Harmonic Distortion + Noise), SNR, frequency response using audio analyzers (AP APx series)</li>
      <li><strong>Perceptual tests</strong>: Listening panel (MUSHRA score) for Bluetooth A2DP vs USB vs AM/FM quality comparison</li>
      <li><strong>Functional tests</strong>: Mute/unmute pop noise, volume ramp linearity, fade/balance accuracy</li>
      <li><strong>Echo cancellation</strong>: AEC performance for hands-free calls (PESQ score)</li>
      <li><strong>Protocol-specific</strong>: Verify A2DP codec negotiation (SBC vs AAC vs aptX) via BT snoop log</li>
    </ul>`
  },
  {
    cat: "carplay",
    tag: "CarPlay",
    q: "What is the CarPlay 'alternate audio route' and how is it tested?",
    a: `<p>CarPlay can route audio to the vehicle's speakers while the phone handles processing — this is the "alternate audio route." The HU receives PCM audio via USB Audio Class and feeds it to the amplifier/speaker system.</p>
    <p>Test cases:</p>
    <ul>
      <li>Verify audio does NOT play from phone speaker when CarPlay is active</li>
      <li>Confirm HU volume controls affect CarPlay audio (via iAP2 volume control messages)</li>
      <li>Test mute/unmute transitions are glitch-free</li>
      <li>Verify Siri audio (voice prompt) routes correctly during active media</li>

    a: `<p><strong>System apps</strong>: Located in <code>/system/app</code> or <code>/system/priv-app</code>. Part of AOSP or GMS. Updated via OTA of system partition or Play Store (if GMS). Examples: SystemUI, CarService, Dialer.</p>
    <p><strong>Vendor apps</strong>: Located in <code>/vendor/app</code>. OEM-specific apps shipped with HU. Typically for HVAC control, vehicle settings, OEM navigation. Updated separately via vendor OTA or OEM app store.</p>
    <p>Security boundary: vendor apps cannot access certain privileged APIs available only to priv-app. SELinux policy enforces this. Test must verify vendor apps don't inadvertently use system-level permissions beyond their grant.</p>`

    <ul>

const list = document.getElementById('qaList');
const noResults = document.getElementById('noResults');
const stats = document.getElementById('stats');
const searchInput = document.getElementById('searchInput');
const expandAllBtn = document.getElementById('expandAll');
let currentCat = 'all';
let expandedAll = false;

function render(filter = 'all', search = '') {
  list.innerHTML = '';
  const q = search.toLowerCase().trim();
  let visible = 0;
  QA.forEach((item, i) => {
    const matchCat = filter === 'all' || item.cat === filter;
    const matchSearch = !q || item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q);
    if (!matchCat || !matchSearch) return;
    visible++;
    const div = document.createElement('div');
    div.className = 'qa-item';
    div.dataset.cat = item.cat;
    div.innerHTML = `
      <div class="q-bar" onclick="toggle(this.parentElement)">
        <span class="q-num">${String(i+1).padStart(2,'0')}</span>
        <span class="q-text">${item.q}</span>
        <span class="q-tag">${item.tag}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="a-body">${item.a}</div>
    `;
    list.appendChild(div);
  });
  noResults.style.display = visible === 0 ? 'block' : 'none';
  stats.textContent = `Showing ${visible} of ${QA.length} questions`;
}

function toggle(el) {
  el.classList.toggle('open');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render(currentCat, searchInput.value);
  });
});

searchInput.addEventListener('input', () => render(currentCat, searchInput.value));

expandAllBtn.addEventListener('click', () => {
  expandedAll = !expandedAll;
  document.querySelectorAll('.qa-item').forEach(el => {
    if (expandedAll) el.classList.add('open');
    else el.classList.remove('open');
  });
  expandAllBtn.textContent = expandedAll ? 'Collapse All' : 'Expand All';
});

render();
</script>
</body>
</html>
